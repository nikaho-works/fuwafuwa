<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Fuwafuwa — Kinetic Installation Mockup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,0,0,0.3);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-align: center;
      pointer-events: none;
    }
    #phase-label {
      position: fixed;
      top: 24px;
      right: 32px;
      color: rgba(0,0,0,0.25);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-align: right;
    }
  </style>
</head>
<body>
<div id="info">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</div>
<div id="phase-label" id="phase-label">—</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f0);
scene.fog = new THREE.FogExp2(0xf5f5f0, 0.035);

const W = window.innerWidth, H = window.innerHeight;
const camera = new THREE.PerspectiveCamera(52, W / H, 0.05, 200);
camera.position.set(7.5, 4.8, 7.5);
camera.lookAt(0, 2.2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Lighting ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x0d0d1a, 2.5);
scene.add(ambient);

// Ceiling fill
const topLight = new THREE.DirectionalLight(0x8899cc, 0.4);
topLight.position.set(0, 12, 0);
scene.add(topLight);

// Key light (soft, from upper-right)
const keyLight = new THREE.SpotLight(0xffffff, 1.2, 40, Math.PI / 6, 0.5, 1.5);
keyLight.position.set(6, 10, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 30;
scene.add(keyLight);

// Sphere follow-light (moves with sphere)
const followLight = new THREE.PointLight(0x99aaff, 1.5, 8, 2);
scene.add(followLight);

// ─── Materials ────────────────────────────────────────────────────────────────
const steelMat = new THREE.MeshStandardMaterial({
  color: 0x999999, metalness: 0.92, roughness: 0.15
});
const darkSteelMat = new THREE.MeshStandardMaterial({
  color: 0x222233, metalness: 0.95, roughness: 0.08
});
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0xddddee, metalness: 0.98, roughness: 0.03
});
const wireMat = new THREE.LineBasicMaterial({
  color: 0xaaaacc, linewidth: 1
});
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xe8e8e0, metalness: 0.05, roughness: 0.85
});

// ─── Geometry constants ────────────────────────────────────────────────────────
const PX = 2.8;   // half-width (x)
const PZ = 2.0;   // half-depth (z)
const PH = 5.2;   // pillar height
const PR = 0.04;  // pillar radius

const corners = [
  new THREE.Vector3(-PX, 0, -PZ),
  new THREE.Vector3( PX, 0, -PZ),
  new THREE.Vector3( PX, 0,  PZ),
  new THREE.Vector3(-PX, 0,  PZ),
];

// ─── Floor ────────────────────────────────────────────────────────────────────
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid
const grid = new THREE.GridHelper(30, 60, 0xbbbbbb, 0xbbbbbb);
grid.position.y = 0.001;
scene.add(grid);

// ─── Pillars + motors + pulleys ───────────────────────────────────────────────
corners.forEach(c => {
  // Pillar
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(PR, PR, PH, 12),
    steelMat
  );
  pillar.position.set(c.x, PH / 2, c.z);
  pillar.castShadow = true;
  scene.add(pillar);

  // Base plate
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.22, 0.06, 16),
    darkSteelMat
  );
  base.position.set(c.x, 0.03, c.z);
  scene.add(base);

  // Stepper motor body
  const motor = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.14, 0.28, 16),
    darkSteelMat
  );
  motor.position.set(c.x, 0.20, c.z);
  motor.castShadow = true;
  scene.add(motor);

  // Motor shaft
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.025, 0.16, 8),
    steelMat
  );
  shaft.position.set(c.x, 0.44, c.z);
  scene.add(shaft);

  // Spool on shaft
  const spool = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.07, 0.10, 16),
    steelMat
  );
  spool.position.set(c.x, 0.50, c.z);
  scene.add(spool);

  // Top cap
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(PR * 1.5, PR * 1.5, 0.04, 12),
    darkSteelMat
  );
  cap.position.set(c.x, PH, c.z);
  scene.add(cap);

  // Pulley (redirect at top)
  const pulley = new THREE.Mesh(
    new THREE.TorusGeometry(0.09, 0.02, 8, 24),
    steelMat
  );
  pulley.position.set(c.x, PH + 0.04, c.z);
  // Orient pulley toward center
  const toCenter = new THREE.Vector3(-c.x, 0, -c.z).normalize();
  pulley.quaternion.setFromUnitVectors(
    new THREE.Vector3(0, 0, 1),
    toCenter
  );
  scene.add(pulley);
});

// ─── Sphere ───────────────────────────────────────────────────────────────────
const sphereMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 64, 64),
  sphereMat
);
sphereMesh.castShadow = true;
scene.add(sphereMesh);

// ─── Wires ────────────────────────────────────────────────────────────────────
// Each wire: [motor-spool → pillar-top → sphere]
// We use two segments per corner; update every frame.
const wireSegments = corners.map(c => {
  const pts = [
    new THREE.Vector3(c.x, 0.50, c.z),   // spool
    new THREE.Vector3(c.x, PH + 0.04, c.z), // pulley top
    new THREE.Vector3(0, 2.2, 0)          // sphere (updated)
  ];
  const geo = new THREE.BufferGeometry();
  const arr = new Float32Array(pts.length * 3);
  pts.forEach((p, i) => { arr[i*3]=p.x; arr[i*3+1]=p.y; arr[i*3+2]=p.z; });
  geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const line = new THREE.Line(geo, wireMat);
  scene.add(line);
  return { line, geo, cx: c.x, cz: c.z };
});

function updateWires(sx, sy, sz) {
  wireSegments.forEach(({ geo, cx, cz }) => {
    const pos = geo.attributes.position.array;
    // segment 0: spool → pulley top (fixed vertical)
    pos[0] = cx; pos[1] = 0.50;       pos[2] = cz;
    pos[3] = cx; pos[4] = PH + 0.04;  pos[5] = cz;
    // segment 1: pulley top → sphere
    pos[6] = sx; pos[7] = sy;          pos[8] = sz;
    geo.attributes.position.needsUpdate = true;
  });
}

// ─── Motion choreography ──────────────────────────────────────────────────────
// Each phase: { name, fn(t) → {x,y,z}, duration }
const motionPhases = [
  {
    name: 'VERTICAL  —  UP / DOWN',
    fn: t => ({
      x: 0,
      y: 2.0 + 1.6 * Math.sin(t * 0.9),
      z: 0
    }),
    duration: 8
  },
  {
    name: 'LATERAL  —  LEFT / RIGHT',
    fn: t => ({
      x: PX * 0.65 * Math.sin(t * 0.8),
      y: 2.2,
      z: 0
    }),
    duration: 8
  },
  {
    name: 'SAGITTAL  —  FORE / AFT',
    fn: t => ({
      x: 0,
      y: 2.2,
      z: PZ * 0.65 * Math.sin(t * 0.85)
    }),
    duration: 8
  },
  {
    name: 'DIAGONAL  —  PENDULUM',
    fn: t => ({
      x: PX * 0.6 * Math.sin(t * 0.75),
      y: 2.5 - 0.6 * Math.abs(Math.sin(t * 0.75)),
      z: PZ * 0.5 * Math.cos(t * 0.75)
    }),
    duration: 10
  },
  {
    name: 'CIRCLE  —  HORIZONTAL',
    fn: t => ({
      x: PX * 0.55 * Math.cos(t * 0.7),
      y: 2.2,
      z: PZ * 0.55 * Math.sin(t * 0.7)
    }),
    duration: 9
  },
  {
    name: 'LEMNISCATE  —  FIGURE 8',
    fn: t => {
      const s = Math.sin(t * 0.6);
      const c = Math.cos(t * 0.6);
      return {
        x: PX * 0.6 * c,
        y: 2.2 + 0.5 * Math.sin(t * 1.2),
        z: PZ * 0.55 * s * c
      };
    },
    duration: 10
  },
  {
    name: 'HELIX  —  SPIRAL DESCENT',
    fn: t => ({
      x: PX * 0.5 * Math.cos(t * 1.1),
      y: 3.4 - t * 0.38,
      z: PZ * 0.5 * Math.sin(t * 1.1)
    }),
    duration: 6
  },
  {
    name: 'CHAOS  —  COMBINED',
    fn: t => ({
      x: PX * 0.58 * Math.sin(t * 0.5) * Math.cos(t * 0.32),
      y: 2.2 + 1.0 * Math.sin(t * 0.65 + 0.8),
      z: PZ * 0.55 * Math.sin(t * 0.42 + 1.2)
    }),
    duration: 12
  },
];

let phaseIdx = 0;
let phaseT = 0;
let globalT = 0;

function currentPosition() {
  const phase = motionPhases[phaseIdx];
  const raw = phase.fn(phaseT);
  // Clamp inside frame
  return {
    x: Math.max(-PX * 0.85, Math.min(PX * 0.85, raw.x)),
    y: Math.max(0.5, Math.min(PH - 0.5, raw.y)),
    z: Math.max(-PZ * 0.85, Math.min(PZ * 0.85, raw.z)),
  };
}

// ─── Spool rotation visualization ─────────────────────────────────────────────
// Track wire lengths to spin spools
const spools = [];
scene.traverse(obj => {
  if (obj.isMesh && obj.geometry.type === 'CylinderGeometry') {
    const params = obj.geometry.parameters;
    if (Math.abs(params.radiusTop - 0.07) < 0.001) spools.push(obj);
  }
});

let prevSpherePos = new THREE.Vector3(0, 2.2, 0);

// ─── Mouse-based camera control ───────────────────────────────────────────────
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let camTheta = Math.PI / 4;   // azimuth
let camPhi   = 0.52;           // elevation
let camR     = 11.5;
const CAM_TARGET = new THREE.Vector3(0, 2.2, 0);

function updateCamera() {
  camera.position.set(
    CAM_TARGET.x + camR * Math.cos(camPhi) * Math.sin(camTheta),
    CAM_TARGET.y + camR * Math.sin(camPhi),
    CAM_TARGET.z + camR * Math.cos(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(CAM_TARGET);
}

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  camTheta -= dx * 0.005;
  camPhi    = Math.max(-0.2, Math.min(1.3, camPhi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup',   () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave',() => { isDragging = false; });
renderer.domElement.addEventListener('wheel', e => {
  camR = Math.max(3, Math.min(22, camR + e.deltaY * 0.015));
  e.preventDefault();
}, { passive: false });

// Touch
renderer.domElement.addEventListener('touchstart', e => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  camTheta -= dx * 0.005;
  camPhi    = Math.max(-0.2, Math.min(1.3, camPhi + dy * 0.005));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

// ─── Auto-rotate camera when idle ─────────────────────────────────────────────
let idleTimer = 0;
const AUTO_ROTATE_SPEED = 0.0015;
renderer.domElement.addEventListener('mousemove', () => { idleTimer = 0; });

// ─── Phase label ──────────────────────────────────────────────────────────────
const phaseLabel = document.getElementById('phase-label');

// ─── Animate ──────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  elapsed += dt;
  globalT += dt;

  // Phase progression
  phaseT += dt;
  if (phaseT >= motionPhases[phaseIdx].duration) {
    phaseT = 0;
    phaseIdx = (phaseIdx + 1) % motionPhases.length;
    phaseLabel.textContent = motionPhases[phaseIdx].name;
  }
  if (elapsed < 0.1) phaseLabel.textContent = motionPhases[phaseIdx].name;

  // Sphere position with smooth easing at phase transitions
  const easeIn = Math.min(1, phaseT / 1.2);
  const pos = currentPosition();
  const sx = pos.x * easeIn;
  const sy = pos.y + (1 - easeIn) * (2.2 - pos.y);
  const sz = pos.z * easeIn;

  sphereMesh.position.set(sx, sy, sz);
  sphereMesh.rotation.y += dt * 0.4;
  sphereMesh.rotation.x += dt * 0.12;

  // Follow light
  followLight.position.set(sx, sy + 0.5, sz);

  // Key light gently breathes
  keyLight.intensity = 1.1 + 0.15 * Math.sin(globalT * 0.3);

  // Update wires
  updateWires(sx, sy, sz);

  // Spool spin proportional to wire delta
  const curPos = new THREE.Vector3(sx, sy, sz);
  const topL = new THREE.Vector3(-PX, PH, -PZ);
  const topR = new THREE.Vector3( PX, PH, -PZ);
  const spoolDelta = curPos.distanceTo(prevSpherePos);
  spools.forEach((sp, i) => {
    sp.rotation.x += spoolDelta * (i % 2 === 0 ? 4 : -4);
  });
  prevSpherePos.copy(curPos);

  // Camera
  idleTimer += dt;
  if (!isDragging && idleTimer > 3) {
    camTheta += AUTO_ROTATE_SPEED;
  }
  updateCamera();

  renderer.render(scene, camera);
}

updateCamera();
animate();

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
